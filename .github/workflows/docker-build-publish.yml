name: Build and Publish Docker Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
      with:
        platforms: all

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Run build-docker.sh
      run: |
        chmod +x scripts/build-docker.sh
        PUSH_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.repository }}" ./scripts/build-docker.sh

    - name: Push Docker image to GHCR
      run: |
        # Extract image tag from build-docker.sh or set it manually
        IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ github.repository }}"
        docker push "$IMAGE_NAME"